#
# WARNING: To install Immich, follow our guide: https://immich.app/docs/install/docker-compose
#
# Make sure to use the docker-compose.yml of the current release:
#
# https://github.com/immich-app/immich/releases/latest/download/docker-compose.yml
#
# The compose file on main may not be compatible with the latest release.

services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:release
    volumes:
      - /volume1/docker/immich/library:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
      # Den delade mappen (Shared Space i Synology Photos)
      - /volume1/photo:/mnt/media/synology-photos:ro
      # Hem-mapparna (Personal Space i Synology Photos)
      - /volume1/homes:/mnt/media/synology-homes:ro
    env_file:
      - .env
    ports:
      - 2283:2283
    depends_on:
      - redis
      - database
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
      # Hårdvaruacceleration. Din NAS har en Intel-processor med QuickSync, vilket är extremt effektivt för att rendera miniatyrbilder och koda om video.

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:release-openvino
    volumes:
      - /volume1/docker/immich/model-cache:/cache
    env_file:
      - .env
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
      # Hårdvaruacceleration. Din NAS har en Intel-processor med QuickSync, vilket är extremt effektivt för att rendera miniatyrbilder och koda om video.

  redis:
    container_name: immich_redis
    image: redis:7-alpine
    restart: unless-stopped

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.3.0-pgvectors0.2.0
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - /volume1/docker/immich/postgres:/var/lib/postgresql/data
    restart: unless-stopped

networks:
  default:
    name: immich_network