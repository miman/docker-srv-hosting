# docker-compose.yml for Uptime Kuma

version: "3.9"
# Specify the Docker Compose file format version.
# Version 3.9 is a good modern choice, compatible with most Docker installations.

services:
   uptime-kuma:
      image: louislam/uptime-kuma:2
      container_name: uptime-kuma
      restart: always
      ports:
         - "4532:3001" # Map container port "3001" to host port "4532"
      volumes:
         - /volume1/docker/uptime-kuma/data:/app/data # Configuring persistent storage
      environment:
         - TZ=UTC # Set timezone (change to your preferred local timezone so monitoring times are the same)
         - UMASK=0022 # Set file permissions manually
      networks:
         - kuma_network # add custom network config
      healthcheck:
         test: [ "CMD", "curl", "-f", "http://localhost:3001" ]
         interval: 30s
         retries: 3
         start_period: 10s
         timeout: 5s
      logging:
         driver: "json-file"
         options:
            max-size: "10m"
            max-file: "3"

networks:
   kuma_network:
      driver: bridge
