# docker-compose.yml for Jellyfin

version: "3.9"
# Specify the Docker Compose file format version.
# Version 3.9 is a good modern choice, compatible with most Docker installations.

services:
   jellyfin:
      image: jellyfin/jellyfin
      container_name: jellyfin
      # Optional - specify the uid and gid you would like Jellyfin to use instead of root
      # user: uid:gid
      ports:
         - 4534:8096/tcp
         - 4535:7359/udp
      volumes:
         - ${JELLYFIN_DATA_ROOT}/config:/config
         - ${JELLYFIN_DATA_ROOT}/cache:/cache
         - type: bind
           source: ${JELLYFIN_DATA_ROOT}/media
           target: /media
         - type: bind
           source: ${JELLYFIN_DATA_ROOT}/media2
           target: /media2
           read_only: true
         # Optional - extra fonts to be used during transcoding with subtitle burn-in
         #- type: bind
         #  source: /path/to/fonts
         #  target: /usr/local/share/fonts/custom
         #  read_only: true
      restart: 'unless-stopped'
      # Optional - alternative address used for autodiscovery
      environment:
         - JELLYFIN_PublishedServerUrl=${JELLYFIN_URL}
      # Optional - may be necessary for docker healthcheck to pass if running in host network mode
      extra_hosts:
         - 'host.docker.internal:host-gateway'
