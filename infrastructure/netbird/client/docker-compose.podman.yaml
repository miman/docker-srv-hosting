services:
    netbird-client:
        container_name: netbird-client
        hostname: <HOSTNAME>
        restart: $RESTART_POLICY
        cap_add:
            - NET_ADMIN
            - SYS_ADMIN
            - SYS_RESOURCE
        devices:
            # Required when using userspace mode or when kernel module is not available
            - /dev/net/tun:/dev/net/tun
        environment:
            - NB_SETUP_KEY=<SETUP KEY>
            # Allows Podman to run completely within user privileges without needing to modify host network interfaces or routing tables directly via the kernel.
            - NB_WT_USERSPACE=true
        volumes:
            - ${DOCKER_FOLDER}/netbird:/var/lib/netbird
        image: docker.io/netbirdio/netbird:latest
