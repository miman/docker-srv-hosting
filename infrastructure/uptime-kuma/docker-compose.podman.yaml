version: "3.9"

services:
  uptime-kuma:
    image: docker.io/louislam/uptime-kuma:2
    container_name: uptime-kuma
    restart: ${RESTART_POLICY}
    ports:
      - "4532:3001" # Map container port "3001" to host port "4532"
    volumes:
      # Configured persistent storage with appended :Z for podman volume permissions
      - ${UPTIME_KUMA_DATA_ROOT}/data:/app/data:Z
    environment:
      - TZ=UTC # Set timezone
      - UMASK=0022 # Set file permissions manually
    networks:
      - kuma_network # Add custom network config
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3001" ]
      interval: 30s
      retries: 3
      start_period: 10s
      timeout: 5s
    logging:
      # Override to podman's native k8s-file logger
      driver: "k8s-file"

networks:
  kuma_network:
    driver: bridge
