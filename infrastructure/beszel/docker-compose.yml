# docker-compose.yml for Beszel

version: "3.9"
# Specify the Docker Compose file format version.
# Version 3.9 is a good modern choice, compatible with most Docker installations.

services:
   beszel:
      image: henrygd/beszel:latest
      container_name: beszel
      restart: ${RESTART_POLICY}
      environment:
         APP_URL: ${BESZEL_URL}
      ports:
         - 4533:8090
      volumes:
         - ${BESZEL_DATA_ROOT}/data:/beszel_data
         - ${BESZEL_DATA_ROOT}/socket:/beszel_socket
      # healthcheck:
      #   test: ['CMD', '/beszel', 'health', '--url', 'http://localhost:8090']
      #   interval: 120s
      #   start_period: 10s
      #   timeout: 5s

   beszel-agent:
      image: henrygd/beszel-agent:latest
      container_name: beszel-agent
      restart: unless-stopped
      network_mode: host
      volumes:
         - ${BESZEL_DATA_ROOT}/agent_data:/var/lib/beszel-agent
         - ${BESZEL_DATA_ROOT}/socket:/beszel_socket
         - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock:ro
      environment:
         LISTEN: /beszel_socket/beszel.sock
         HUB_URL: http://localhost:4533
         TOKEN: <token>
         KEY: "<key>"
      # healthcheck:
      #   test: ['CMD', '/agent', 'health']
      #   interval: 120s

