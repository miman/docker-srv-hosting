# docker-compose.yml for Beszel Agent

version: "3.9"

services:
   beszel-agent:
      image: henrygd/beszel-agent:latest
      container_name: beszel-agent
      restart: unless-stopped
      network_mode: host
      volumes:
         - ${BESZEL_DATA_ROOT}/agent_data:/var/lib/beszel-agent
         - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock:ro
      environment:
         PORT: 45876
         KEY: "${BESZEL_KEY}"
         TOKEN: "${BESZEL_TOKEN}"
