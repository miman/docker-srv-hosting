use_default_settings: true
server:
  secret_key: "replace-with-your-passw" # Secure internal token for instance communication
  limiter: false # Required: Disables security rate-limiting for rapid-fire AI queries
  image_proxy: true # Proxies images through your server to prevent leaking client details
  proxies:
    - 127.0.0.1
    - 172.16.0.0/12  # Instructs SearXNG to trust internal Docker network traffic
search:
  formats:
    - html
    - json # Critical: Required for Open WebUI to properly parse search results

engines:
  - name: qwant
    disabled: false        # Active: Stable European privacy engine, highly resilient to AI queries

  - name: bing
    disabled: true         # Optional: Set to 'false' if Qwant needs a backup global index

  - name: wikipedia
    disabled: false        # Active: Fast, reliable, and immune to scraping blocks

  - name: google
    disabled: true         # Disabled: Highly prone to blocking data center and local IPs

  - name: duckduckgo
    disabled: true         # Disabled: Triggers aggressive Cloudflare anti-bot walls

  - name: brave
    disabled: true         # Disabled: Strict anti-bot limits will instantly ban AI query patterns
