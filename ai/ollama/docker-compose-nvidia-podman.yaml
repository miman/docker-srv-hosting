# This file only contains the extra part needed if the computer has an nvidia card (Podman)
# Podman does not support 'runtime: nvidia', it uses CDI (Container Device Interface) instead.
# Ensure CDI is configured: sudo nvidia-ctk cdi generate --output=/etc/cdi/nvidia.yaml

services:
  ollama-container:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - CUDA_VISIBLE_DEVICES=0
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q4_0
